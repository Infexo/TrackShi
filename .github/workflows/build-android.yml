name: Build Android APK
#nothing1
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ⬇️ FIX: Node 22 required by Capacitor CLI
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      # ⬇️ FIX: cap copy only moves web assets, never touches native code
      - name: Copy web assets to Android
        run: |
          npx cap copy android
          node scripts/restore-native.cjs

      # ⬇️ Verify nothing is missing before wasting time on Gradle
      - name: Verify native files
        run: |
          echo "=== Checking MainActivity.java ==="
          test -f android/app/src/main/java/com/trackshi/app/MainActivity.java \
            && echo "✅ MainActivity exists" \
            || (echo "❌ MainActivity MISSING" && exit 1)
          echo "=== Checking AndroidManifest.xml ==="
          grep -q "android.permission.INTERNET" \
            android/app/src/main/AndroidManifest.xml \
            && echo "✅ INTERNET permission found" \
            || (echo "❌ INTERNET permission MISSING" && exit 1)
          echo "=== Checking app icons ==="
          test -d android/app/src/main/res \
            && echo "✅ res folder found" \
            || (echo "❌ res folder MISSING" && exit 1)
          echo ""
          echo "=== All critical checks passed ==="
      # ⬇️ FIX: Java setup BEFORE Gradle build
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk